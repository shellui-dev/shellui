# Deploy ShellUI Preview to GitHub Pages (for docs embedding)
name: Deploy Preview to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'NET10/ShellUI.Preview/**'
      - 'src/ShellUI.Components/**'
      - '.github/workflows/preview-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish Preview (Blazor WASM)
        run: |
          dotnet publish NET10/ShellUI.Preview/ShellUI.Preview.csproj \
            -c Release \
            -o ./preview-publish

      # GitHub Pages serves at https://<owner>.github.io/<repo>/, so the Blazor
      # <base href> must be /<repo>/ or the framework files 404. Patch after
      # publish so local dev stays on / and only the deployed artifact is rewritten.
      - name: Rewrite base href for GH Pages
        run: |
          BASE_HREF="/${GITHUB_REPOSITORY#*/}/"
          echo "Rewriting <base href> to $BASE_HREF"
          sed -i "s|<base href=\"/\" />|<base href=\"$BASE_HREF\" />|" ./preview-publish/wwwroot/index.html
          grep '<base href' ./preview-publish/wwwroot/index.html

      # SPA fallback: GH Pages doesn't rewrite unknown paths to index.html, so
      # deep links like /preview/button 404 on first load. Copying index.html to
      # 404.html gets us the standard "jekyll-less SPA on Pages" fallback.
      - name: Add SPA 404 fallback
        run: cp ./preview-publish/wwwroot/index.html ./preview-publish/wwwroot/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          # Auto-enable Pages on first run so this workflow can deploy without
          # someone clicking through Settings → Pages first. Requires the
          # GITHUB_TOKEN to have `pages: write` (already set above).
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./preview-publish/wwwroot

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
